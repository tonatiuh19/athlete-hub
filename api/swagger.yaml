openapi: 3.0.3
info:
  title: Athlete Hub API
  description: |
    REST API for the Athlete Hub sports events platform.

    ## Authentication
    - **Protected routes** require `Authorization: Bearer <session_token>`
    - **Public routes** require no authentication

    ## Base URL
    All endpoints are prefixed with `/api`.
  version: "1.0.0"
  contact:
    name: Athlete Hub Dev

servers:
  - url: /api
    description: Same-origin (development & production)

tags:
  - name: Health
    description: System health checks
  - name: Auth
    description: Passwordless OTP authentication (athlete, organizer, admin)
  - name: Marketplace
    description: Public event discovery
  - name: Athlete
    description: Athlete portal
  - name: Organizer
    description: Organizer portal
  - name: Admin
    description: Platform admin
  - name: Webhooks
    description: External service webhooks (Stripe)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
        "503":
          description: Database disconnected

  /ping:
    get:
      tags: [Health]
      summary: Ping
      responses:
        "200":
          description: Pong

  /auth/athlete/check-email:
    post:
      tags: [Auth]
      summary: Check if an athlete account exists for an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        "200":
          description: Whether the email is registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean

  /auth/athlete/request-otp:
    post:
      tags: [Auth]
      summary: Request athlete OTP (email or SMS)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                  enum: [email, sms]
                email:
                  type: string
                phone:
                  type: string
                purpose:
                  type: string
                  enum: [login, register, verify]
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        "200":
          description: OTP sent

  /auth/athlete/verify-otp:
    post:
      tags: [Auth]
      summary: Verify athlete OTP and create session
      responses:
        "200":
          description: Session token returned

  /auth/organizer/request-otp:
    post:
      tags: [Auth]
      summary: Request organizer OTP
      responses:
        "200":
          description: OTP sent

  /auth/organizer/verify-otp:
    post:
      tags: [Auth]
      summary: Verify organizer OTP
      responses:
        "200":
          description: Session token returned

  /auth/admin/request-otp:
    post:
      tags: [Auth]
      summary: Request admin OTP
      responses:
        "200":
          description: OTP sent

  /auth/admin/verify-otp:
    post:
      tags: [Auth]
      summary: Verify admin OTP
      responses:
        "200":
          description: Session token returned

  /auth/admin/me:
    get:
      tags: [Auth]
      summary: Current admin profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin profile
    patch:
      tags: [Auth]
      summary: Update current admin profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  nullable: true
                preferred_language:
                  type: string
                  enum: [es, en]
      responses:
        "200":
          description: Updated admin profile

  /auth/admin/avatar:
    post:
      tags: [Auth]
      summary: Upload admin profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo uploaded
    delete:
      tags: [Auth]
      summary: Remove admin profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo removed

  /auth/organizer/me:
    get:
      tags: [Auth]
      summary: Current organizer member profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizer member profile
    patch:
      tags: [Auth]
      summary: Update current organizer member profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  nullable: true
                preferred_language:
                  type: string
                  enum: [es, en]
      responses:
        "200":
          description: Updated organizer member profile

  /auth/organizer/avatar:
    post:
      tags: [Auth]
      summary: Upload organizer member profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo uploaded
    delete:
      tags: [Auth]
      summary: Remove organizer member profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo removed

  /auth/clerk/athlete:
    post:
      tags: [Auth]
      summary: Exchange Clerk session for athlete JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionToken]
              properties:
                sessionToken:
                  type: string
      responses:
        "200":
          description: Athlete session token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /sport-types:
    get:
      tags: [Marketplace]
      summary: List active sport types
      responses:
        "200":
          description: Sport types list

  /public/home:
    get:
      tags: [Marketplace]
      summary: Public home page data (live stats, featured events, leaderboards)
      responses:
        "200":
          description: Platform stats, featured/upcoming events, top athletes and teams

  /events:
    get:
      tags: [Marketplace]
      summary: List published public events with search, filters, and pagination
      parameters:
        - name: q
          in: query
          description: Search query (title, city, organizer)
          schema:
            type: string
        - name: sport
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [date_asc, date_desc, price_asc, price_desc, popular]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Events list with total count, includes location_lat and location_lng

  /events/filters/cities:
    get:
      tags: [Marketplace]
      summary: List distinct cities for published events (for filter dropdown)
      responses:
        "200":
          description: Array of city names

  /events/{slug}:
    get:
      tags: [Marketplace]
      summary: Get event detail with categories, registration fields, course, and media
      description: |
        Optional Bearer athlete token. When authenticated, includes `myRegistration`
        if the athlete has a pending or confirmed registration for this event.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event detail (may include myRegistration for signed-in athletes)
        "404":
          description: Event not found

  /athlete/me:
    get:
      tags: [Athlete]
      summary: Get current athlete profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Athlete profile
    patch:
      tags: [Athlete]
      summary: Update athlete profile (name, contact, sport details)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name]
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  nullable: true
                date_of_birth:
                  type: string
                  format: date
                  nullable: true
                gender:
                  type: string
                  enum: [male, female, other, prefer_not_to_say]
                  nullable: true
                shirt_size:
                  type: string
                  enum: [XS, S, M, L, XL, XXL]
                  nullable: true
                country:
                  type: string
                city:
                  type: string
                  nullable: true
                emergency_contact_name:
                  type: string
                  nullable: true
                emergency_contact_phone:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Profile updated
        "400":
          description: Validation error
        "409":
          description: Phone already in use

  /athlete/preferences:
    patch:
      tags: [Athlete]
      summary: Update athlete preferences (language)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                preferred_language:
                  type: string
                  enum: [es, en]
      responses:
        "200":
          description: Preferences updated

  /athlete/registrations:
    get:
      tags: [Athlete]
      summary: List athlete registrations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registrations list

  /athlete/waitlist:
    get:
      tags: [Athlete]
      summary: List athlete waitlist entries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active waitlist entries with event and category info

  /athlete/results:
    get:
      tags: [Athlete]
      summary: List published race results for the athlete
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Published results with ranks and finish times

  /athlete/avatar:
    post:
      tags: [Athlete]
      summary: Upload profile photo (optimized data URL)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  description: data:image/jpeg;base64,... (max 180KB decoded)
      responses:
        "200":
          description: Avatar updated
        "400":
          description: Invalid image
    delete:
      tags: [Athlete]
      summary: Remove custom profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar removed

  /athlete/payment-methods:
    get:
      tags: [Athlete]
      summary: List saved Stripe payment methods for the athlete
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved cards and default payment method id

  /athlete/payment-methods/setup-intent:
    post:
      tags: [Athlete]
      summary: Create Stripe SetupIntent to add a new card
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SetupIntent client secret

  /athlete/payment-methods/complete-setup:
    post:
      tags: [Athlete]
      summary: Finalize card setup and optionally set default
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setupIntentId]
              properties:
                setupIntentId:
                  type: string
                setAsDefault:
                  type: boolean
      responses:
        "200":
          description: Updated payment methods list

  /athlete/payment-methods/default:
    patch:
      tags: [Athlete]
      summary: Set default payment method
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentMethodId]
              properties:
                paymentMethodId:
                  type: string
      responses:
        "200":
          description: Updated payment methods list

  /athlete/payment-methods/{paymentMethodId}:
    delete:
      tags: [Athlete]
      summary: Remove a saved payment method
      security:
        - bearerAuth: []
      parameters:
        - name: paymentMethodId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated payment methods list

  /athlete/teams:
    get:
      tags: [Athlete]
      summary: List teams the athlete belongs to
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Teams list
    post:
      tags: [Athlete]
      summary: Create a new athlete team
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                avatar_url:
                  type: string
                  nullable: true
                is_public:
                  type: boolean
      responses:
        "201":
          description: Team created

  /athlete/teams/join:
    post:
      tags: [Athlete]
      summary: Join a team using an invite code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_code]
              properties:
                invite_code:
                  type: string
      responses:
        "200":
          description: Joined team
        "404":
          description: Invalid invite code
        "409":
          description: Already a member

  /athlete/teams/{teamId}:
    get:
      tags: [Athlete]
      summary: Team detail with members
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
          description: Numeric id or public UUID
      responses:
        "200":
          description: Team detail
        "403":
          description: Private team
        "404":
          description: Team not found

  /athlete/teams/{teamId}/leave:
    post:
      tags: [Athlete]
      summary: Leave a team
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left team
        "400":
          description: Owner cannot leave

  /athlete/gamification:
    get:
      tags: [Athlete]
      summary: XP, level, streak, and recent achievements
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gamification profile

  /athlete/achievements:
    get:
      tags: [Athlete]
      summary: All earned achievement badges
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Achievements list

  /athlete/registrations/{publicUuid}/transfer:
    post:
      tags: [Athlete]
      summary: Transfer registration to another athlete by email
      security:
        - bearerAuth: []
      parameters:
        - name: publicUuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientEmail]
              properties:
                recipientEmail:
                  type: string
                  format: email
      responses:
        "200":
          description: Transfer completed
        "400":
          description: Transfers not allowed or invalid state
        "403":
          description: Not the registration owner
        "404":
          description: Registration or recipient not found
        "409":
          description: Recipient already registered

  /events/{slug}/register/checkout:
    post:
      tags: [Marketplace]
      summary: Create pending registration and Stripe PaymentIntent
      description: |
        Creates a Stripe checkout (payment record only). Registration is created
        when payment succeeds via /register/confirm or payment_intent.succeeded webhook.
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, idempotencyKey]
              properties:
                categoryId:
                  type: integer
                fieldValues:
                  type: object
                  additionalProperties: true
                idempotencyKey:
                  type: string
                waiverId:
                  type: integer
                  description: Required when event requires_waiver is true
                waiverSignature:
                  type: string
                  description: Typed signature when waiver is required
                discountCode:
                  type: string
                  description: Optional discount code to apply at checkout
      responses:
        "200":
          description: Checkout session with client secret
        "401":
          description: Unauthorized
        "409":
          description: Already registered, sold out, or waitlist available (code waitlist_available)

  /events/{slug}/discount/validate:
    post:
      tags: [Marketplace]
      summary: Validate discount code and preview pricing
      description: Public endpoint; athlete auth optional.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, categoryId]
              properties:
                code:
                  type: string
                categoryId:
                  type: integer
      responses:
        "200":
          description: Discount preview with adjusted price breakdown
        "400":
          description: Invalid or inapplicable discount code

  /events/{slug}/waitlist:
    post:
      tags: [Marketplace]
      summary: Join category waitlist when sold out
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId]
              properties:
                categoryId:
                  type: integer
      responses:
        "201":
          description: Waitlist entry created
        "400":
          description: Category not sold out or waitlist disabled
        "409":
          description: Already on waitlist or registered

  /events/{slug}/register/confirm:
    post:
      tags: [Marketplace]
      summary: Confirm payment and activate registration
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentPublicUuid]
              properties:
                paymentPublicUuid:
                  type: string
                paymentIntentId:
                  type: string
                paymentMethodId:
                  type: string
                  description: Pay with a saved card (server-side confirm)
      responses:
        "200":
          description: Registration confirmed
        "402":
          description: Payment failed

  /config/payments:
    get:
      tags: [Marketplace]
      summary: Stripe publishable key and currency
      responses:
        "200":
          description: Payment configuration

  /config/app-version:
    get:
      tags: [Health]
      summary: Deployed application version (footer display)
      responses:
        "200":
          description: Current app version
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    nullable: true

  /organizer/events:
    get:
      tags: [Organizer]
      summary: List organizer events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Events list
    post:
      tags: [Organizer]
      summary: Create a new event draft
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, sport_type_id, start_date]
              properties:
                title:
                  type: string
                sport_type_id:
                  type: integer
                start_date:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Event created

  /organizer/events/{eventId}:
    get:
      tags: [Organizer]
      summary: Event detail with categories
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event detail
    patch:
      tags: [Organizer]
      summary: Update organizer event
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated event

  /organizer/events/{eventId}/publish:
    post:
      tags: [Organizer]
      summary: Publish event (requires active categories)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event published

  /organizer/events/{eventId}/categories:
    post:
      tags: [Organizer]
      summary: Add registration category
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Category added

  /organizer/events/{eventId}/categories/{categoryId}:
    patch:
      tags: [Organizer]
      summary: Update category pricing and capacity
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories updated
    delete:
      tags: [Organizer]
      summary: Remove or deactivate category
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories updated

  /organizer/events/{eventId}/registration-fields:
    get:
      tags: [Organizer]
      summary: List custom registration fields
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration fields
    put:
      tags: [Organizer]
      summary: Replace custom registration fields
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fields updated

  /organizer/events/{eventId}/waivers:
    get:
      tags: [Organizer]
      summary: List event waivers
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Waivers list
    put:
      tags: [Organizer]
      summary: Publish new waiver version
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Waiver saved

  /organizer/events/{eventId}/schedule-waves:
    get:
      tags: [Organizer]
      summary: List schedule waves
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Waves list
    put:
      tags: [Organizer]
      summary: Replace schedule waves
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Waves saved

  /organizer/events/{eventId}/course:
    get:
      tags: [Organizer]
      summary: Get event course map
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course data
    put:
      tags: [Organizer]
      summary: Upsert event course map
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course saved

  /organizer/events/{eventId}/discount-codes:
    get:
      tags: [Organizer]
      summary: List discount codes
      security:
        - bearerAuth: []
