        "200":
          description: Sponsors list
    put:
      tags: [Admin]
      summary: Replace sponsors for any event (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated sponsors

  /admin/events/{eventId}/media:
    get:
      tags: [Admin]
      summary: List media assets for an event (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Media assets
    put:
      tags: [Admin]
      summary: Replace media assets for an event (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated media

  /admin/events/{eventId}/waitlist:
    get:
      tags: [Admin]
      summary: Waitlist queue for an event (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Waitlist entries

  /admin/events/{eventId}/waitlist/offer:
    post:
      tags: [Admin]
      summary: Offer a waitlist spot (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Offer sent

  /admin/events/{eventId}/waitlist/revoke:
    post:
      tags: [Admin]
      summary: Revoke or remove a waitlist entry (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [waitlistEntryId]
              properties:
                waitlistEntryId:
                  type: integer
      responses:
        "200":
          description: Updated waitlist entries
        "404":
          description: Entry not found or already resolved

  /admin/events/{eventId}/categories:
    post:
      tags: [Admin]
      summary: Add registration category (admin, any event)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Category added

  /admin/events/{eventId}/categories/{categoryId}:
    patch:
      tags: [Admin]
      summary: Update category (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories updated
    delete:
      tags: [Admin]
      summary: Remove or deactivate category (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories updated

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
