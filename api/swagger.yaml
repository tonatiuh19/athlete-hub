openapi: 3.0.3
info:
  title: Athlete Hub API
  description: |
    REST API for the Athlete Hub sports events platform.

    ## Authentication
    - **Protected routes** require `Authorization: Bearer <session_token>`
    - **Public routes** require no authentication

    ## Base URL
    All endpoints are prefixed with `/api`.
  version: "1.0.0"
  contact:
    name: Athlete Hub Dev

servers:
  - url: /api
    description: Same-origin (development & production)

tags:
  - name: Health
    description: System health checks
  - name: Auth
    description: Passwordless OTP authentication (athlete, organizer, admin)
  - name: Marketplace
    description: Public event discovery
  - name: Athlete
    description: Athlete portal
  - name: Organizer
    description: Organizer portal
  - name: Admin
    description: Platform admin
  - name: Webhooks
    description: External service webhooks (Stripe)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
        "503":
          description: Database disconnected

  /ping:
    get:
      tags: [Health]
      summary: Ping
      responses:
        "200":
          description: Pong

  /auth/athlete/check-email:
    post:
      tags: [Auth]
      summary: Check if an athlete account exists for an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        "200":
          description: Whether the email is registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  hasPassword:
                    type: boolean
                  hasSocialLogin:
                    type: boolean

  /auth/athlete/register:
    post:
      tags: [Auth]
      summary: Register athlete with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, firstName, lastName, password, dateOfBirth]
              properties:
                email:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                password:
                  type: string
                dateOfBirth:
                  type: string
                  format: date
                  description: YYYY-MM-DD — used for category eligibility
                gender:
                  type: string
                  enum: [male, female, other, prefer_not_to_say]
      responses:
        "200":
          description: Session token returned

  /auth/athlete/login:
    post:
      tags: [Auth]
      summary: Athlete email/password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Session token returned
        "403":
          description: Password not set — reset email sent

  /auth/athlete/forgot-password:
    post:
      tags: [Auth]
      summary: Request athlete password reset email
      responses:
        "200":
          description: Always returns ok (no email enumeration)

  /auth/athlete/reset-password:
    post:
      tags: [Auth]
      summary: Reset athlete password with email and 6-digit code from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, password]
              properties:
                email:
                  type: string
                code:
                  type: string
                  pattern: "^\\d{6}$"
                password:
                  type: string
      responses:
        "200":
          description: Password updated; may return session token

  /auth/organizer/request-otp:
    post:
      tags: [Auth]
      summary: Request organizer OTP
      responses:
        "200":
          description: OTP sent

  /auth/organizer/verify-otp:
    post:
      tags: [Auth]
      summary: Verify organizer OTP
      responses:
        "200":
          description: Session token returned

  /auth/admin/request-otp:
    post:
      tags: [Auth]
      summary: Request admin OTP
      responses:
        "200":
          description: OTP sent

  /auth/admin/verify-otp:
    post:
      tags: [Auth]
      summary: Verify admin OTP
      responses:
        "200":
          description: Session token returned

  /auth/admin/me:
    get:
      tags: [Auth]
      summary: Current admin profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin profile
    patch:
      tags: [Auth]
      summary: Update current admin profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  nullable: true
                preferred_language:
                  type: string
                  enum: [es, en]
      responses:
        "200":
          description: Updated admin profile

  /auth/admin/avatar:
    post:
      tags: [Auth]
      summary: Upload admin profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo uploaded
    delete:
      tags: [Auth]
      summary: Remove admin profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo removed

  /auth/organizer/me:
    get:
      tags: [Auth]
      summary: Current organizer member profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizer member profile
    patch:
      tags: [Auth]
      summary: Update current organizer member profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  nullable: true
                preferred_language:
                  type: string
                  enum: [es, en]
      responses:
        "200":
          description: Updated organizer member profile

  /auth/organizer/avatar:
    post:
      tags: [Auth]
      summary: Upload organizer member profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo uploaded
    delete:
      tags: [Auth]
      summary: Remove organizer member profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photo removed

  /auth/clerk/athlete:
    post:
      tags: [Auth]
      summary: Exchange Clerk session for athlete JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionToken]
              properties:
                sessionToken:
                  type: string
      responses:
        "200":
          description: Athlete session token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /sport-types:
    get:
      tags: [Marketplace]
      summary: List active sport types
      responses:
        "200":
          description: Sport types list

  /public/home:
    get:
      tags: [Marketplace]
      summary: Public home page data (live stats, all published events, leaderboards)
      responses:
        "200":
          description: Platform stats, published events, top athletes and teams

  /public/teams:
    get:
      tags: [Marketplace]
      summary: Browse public athlete Triboos (teams)
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          schema:
            type: string
            enum: [members, newest]
      responses:
        "200":
          description: Paginated public teams list

  /public/teams/{slug}:
    get:
      tags: [Marketplace]
      summary: Public Triboo profile by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team profile with member preview
        "404":
          description: Not found

  /public/blog:
    get:
      tags: [Marketplace]
      summary: List published blog posts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: organizer
          in: query
          description: Filter by organizer slug
          schema:
            type: string
      responses:
        "200":
          description: Paginated blog posts

  /public/blog/{slug}:
    get:
      tags: [Marketplace]
      summary: Get published blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post detail
        "404":
          description: Not found

  /events:
    get:
      tags: [Marketplace]
      summary: List published public events with search, filters, and pagination
      parameters:
        - name: q
          in: query
          description: >
            Search query (min 2 chars). Uses the same fuzzy, accent-insensitive
            matching as GET /search/suggest across title, sport, city, organizer,
            and keywords. Default sort date_asc ranks by relevance when q is set.
          schema:
            type: string
        - name: sport
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: geoCityId
          in: query
          schema:
            type: integer
          description: Canonical geo_cities id for exact city+state filtering. Unknown ids return an empty result set.
        - name: featured
          in: query
          schema:
            type: boolean
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: Inclusive start of date range (compared by calendar day)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: Inclusive end of date range (compared by calendar day). Inverted ranges are normalized automatically.
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [date_asc, date_desc, price_asc, price_desc, popular]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Events list with total count, includes location_lat and location_lng

  /geo/states:
    get:
      tags: [Geo]
      summary: List states/provinces for a country
      parameters:
        - name: country
          in: query
          schema:
            type: string
            default: MX
      responses:
        "200":
          description: States list

  /geo/cities:
    get:
      tags: [Geo]
      summary: List cities from the geo catalog
      parameters:
        - name: country
          in: query
          schema:
            type: string
            default: MX
        - name: state_id
          in: query
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Cities list with state metadata

  /events/filters/cities:
    get:
      tags: [Marketplace]
      summary: List cities with published event counts (geo catalog backed)
      responses:
        "200":
          description: Array of geo cities with id, city, state, lat, lng, and event_count

  /search/suggest:
    get:
      tags: [Marketplace]
      summary: Unified autocomplete for events, cities, and sports
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Grouped search suggestions

  /events/{slug}:
    get:
      tags: [Marketplace]
      summary: Get event detail with categories, registration fields, course, and media
      description: |
        Optional Bearer athlete token. When authenticated, includes `myRegistration`
        if the athlete has a pending or confirmed registration for this event.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event detail (may include myRegistration for signed-in athletes)
        "404":
          description: Event not found

  /athlete/me:
    get:
      tags: [Athlete]
      summary: Get current athlete profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Athlete profile
    patch:
      tags: [Athlete]
      summary: Update athlete profile (name, contact, sport details)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name]
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  nullable: true
                date_of_birth:
                  type: string
                  format: date
                  nullable: true
                gender:
                  type: string
                  enum: [male, female, other, prefer_not_to_say]
                  nullable: true
                shirt_size:
                  type: string
                  enum: [XS, S, M, L, XL, XXL]
                  nullable: true
                country:
                  type: string
                city:
                  type: string
                  nullable: true
                emergency_contact_name:
                  type: string
                  nullable: true
                emergency_contact_phone:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Profile updated
        "400":
          description: Validation error
        "409":
          description: Phone already in use

  /athlete/preferences:
    patch:
      tags: [Athlete]
      summary: Update athlete preferences (language)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                preferred_language:
                  type: string
                  enum: [es, en]
      responses:
        "200":
          description: Preferences updated

  /athlete/registrations:
    get:
      tags: [Athlete]
      summary: List athlete registrations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registrations list

  /athlete/waitlist:
    get:
      tags: [Athlete]
      summary: List athlete waitlist entries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active waitlist entries with event and category info

  /athlete/results:
    get:
      tags: [Athlete]
      summary: List published race results for the athlete
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Published results with ranks and finish times

  /athlete/avatar:
    post:
      tags: [Athlete]
      summary: Upload profile photo (optimized data URL)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  description: data:image/jpeg;base64,... (max 180KB decoded)
      responses:
        "200":
          description: Avatar updated
        "400":
          description: Invalid image
    delete:
      tags: [Athlete]
      summary: Remove custom profile photo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar removed

  /athlete/payment-methods:
    get:
      tags: [Athlete]
      summary: List saved Stripe payment methods for the athlete
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved cards and default payment method id

  /athlete/payment-methods/setup-intent:
    post:
      tags: [Athlete]
      summary: Create Stripe SetupIntent to add a new card
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SetupIntent client secret

  /athlete/payment-methods/complete-setup:
    post:
      tags: [Athlete]
      summary: Finalize card setup and optionally set default
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setupIntentId]
              properties:
                setupIntentId:
                  type: string
                setAsDefault:
                  type: boolean
      responses:
        "200":
          description: Updated payment methods list

  /athlete/payment-methods/default:
    patch:
      tags: [Athlete]
      summary: Set default payment method
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentMethodId]
              properties:
                paymentMethodId:
                  type: string
      responses:
        "200":
          description: Updated payment methods list

  /athlete/payment-methods/{paymentMethodId}:
    delete:
      tags: [Athlete]
      summary: Remove a saved payment method
      security:
        - bearerAuth: []
      parameters:
        - name: paymentMethodId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated payment methods list

  /athlete/teams:
    get:
      tags: [Athlete]
      summary: List teams the athlete belongs to
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Teams list
    post:
      tags: [Athlete]
      summary: Create a new athlete team
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                avatar_url:
                  type: string
                  nullable: true
                is_public:
                  type: boolean
      responses:
        "201":
          description: Team created

  /athlete/teams/join:
    post:
      tags: [Athlete]
      summary: Join a team using an invite code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_code]
              properties:
                invite_code:
                  type: string
      responses:
        "200":
          description: Joined team
        "404":
          description: Invalid invite code
        "409":
          description: Already a member

  /athlete/teams/{teamId}:
    get:
      tags: [Athlete]
      summary: Team detail with members
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
          description: Numeric id or public UUID
      responses:
        "200":
          description: Team detail
        "403":
          description: Private team
        "404":
          description: Team not found

  /athlete/teams/{teamId}/leave:
    post:
      tags: [Athlete]
      summary: Leave a team
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left team
        "400":
          description: Owner cannot leave

  /athlete/gamification:
    get:
      tags: [Athlete]
      summary: XP, level, streak, and recent achievements
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gamification profile

  /athlete/achievements:
    get:
      tags: [Athlete]
      summary: All earned achievement badges
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Achievements list

  /athlete/registrations/{publicUuid}/transfer:
    post:
      tags: [Athlete]
      summary: Transfer registration to another athlete by email
      security:
        - bearerAuth: []
      parameters:
        - name: publicUuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientEmail]
              properties:
                recipientEmail:
                  type: string
                  format: email
      responses:
        "200":
          description: Transfer completed
        "400":
          description: Transfers not allowed or invalid state
        "403":
          description: Not the registration owner
        "404":
          description: Registration or recipient not found
        "409":
          description: Recipient already registered

  /events/{slug}/register/checkout:
    post:
      tags: [Marketplace]
      summary: Create pending registration and Stripe PaymentIntent
      description: |
        Creates a Stripe checkout (payment record only). Registration is created
        when payment succeeds via /register/confirm or payment_intent.succeeded webhook.
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, idempotencyKey]
              properties:
                categoryId:
                  type: integer
                fieldValues:
                  type: object
                  additionalProperties: true
                idempotencyKey:
                  type: string
                waiverId:
                  type: integer
                  description: Required when event requires_waiver is true
                waiverSignature:
                  type: string
                  description: Typed signature when waiver is required
                discountCode:
                  type: string
                  description: Optional discount code to apply at checkout
      responses:
        "200":
          description: Checkout session with client secret
        "401":
          description: Unauthorized
        "409":
          description: Already registered, sold out, or waitlist available (code waitlist_available)

  /events/{slug}/discount/validate:
    post:
      tags: [Marketplace]
      summary: Validate discount code and preview pricing
      description: Public endpoint; athlete auth optional.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, categoryId]
              properties:
                code:
                  type: string
                categoryId:
                  type: integer
      responses:
        "200":
          description: Discount preview with adjusted price breakdown
        "400":
          description: Invalid or inapplicable discount code

  /events/{slug}/waitlist:
    post:
      tags: [Marketplace]
      summary: Join category waitlist when sold out
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId]
              properties:
                categoryId:
                  type: integer
      responses:
        "201":
          description: Waitlist entry created
        "400":
          description: Category not sold out or waitlist disabled
        "409":
          description: Already on waitlist or registered

  /events/{slug}/register/confirm:
    post:
      tags: [Marketplace]
      summary: Confirm payment and activate registration
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentPublicUuid]
              properties:
                paymentPublicUuid:
                  type: string
                paymentIntentId:
                  type: string
                paymentMethodId:
                  type: string
                  description: Pay with a saved card (server-side confirm)
      responses:
        "200":
          description: Registration confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  confirmationEmail:
                    type: string
                    description: Athlete login email — confirmation is sent here only
                  registration:
                    type: object
        "402":
          description: Payment failed or requires additional authentication (3DS)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                  requiresAction:
                    type: boolean
                  clientSecret:
                    type: string

  /athlete/pending-checkout:
    get:
      tags: [Athlete]
      summary: List incomplete registration checkouts for the signed-in athlete
      security:
        - bearerAuth: []
      parameters:
        - name: eventSlug
          in: query
          required: false
          schema:
            type: string
          description: When set, returns at most one pending checkout for that event
      responses:
        "200":
          description: Pending checkout payments without a linked registration
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: array
                    items:
                      type: object
                      properties:
                        public_uuid:
                          type: string
                        amount_cents:
                          type: integer
                        currency:
                          type: string
                        status:
                          type: string
                        event_title:
                          type: string
                        event_slug:
                          type: string
                        category_name:
                          type: string
                          nullable: true
                        category_id:
                          type: integer
                          nullable: true

  /config/payments:
    get:
      tags: [Marketplace]
