<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Triboo Sport — Events &amp; Athlete Community</title>
    <meta
      name="description"
      content="Connect. Participate. Push your limits. Discover and register for triathlons, marathons, and races across Mexico and Latin America."
    />
    <meta name="theme-color" content="#f5f6f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#05070D" media="(prefers-color-scheme: dark)" />
    <script>
      try {
        const stored = localStorage.getItem("triboo-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const useDark =
          stored === "dark" || ((stored === "system" || stored === null) && prefersDark);
        if (useDark) document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
    <meta name="robots" content="index, follow" />
    <!-- Canonical is set per-route by MetaHelmet (href="/" breaks Vite build) -->
    <meta property="og:site_name" content="Triboo Sport" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Triboo Sport — Events &amp; Athlete Community" />
    <meta
      property="og:description"
      content="Connect. Participate. Push your limits. Discover and register for triathlons, marathons, and races across Mexico and Latin America."
    />
    <meta
      property="og:image"
      content="https://disruptinglabs.com/data/athlete-hub/assets/images/og/triboo-sport-share.jpg"
    />
    <meta
      property="og:image:secure_url"
      content="https://disruptinglabs.com/data/athlete-hub/assets/images/og/triboo-sport-share.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Triboo Sport — sports events and athlete community" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Triboo Sport — Events &amp; Athlete Community" />
    <meta
      name="twitter:description"
      content="Connect. Participate. Push your limits. Discover and register for triathlons, marathons, and races across Mexico and Latin America."
    />
    <meta
      name="twitter:image"
      content="https://disruptinglabs.com/data/athlete-hub/assets/images/og/triboo-sport-share.jpg"
    />
    <meta name="twitter:image:alt" content="Triboo Sport — sports events and athlete community" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
